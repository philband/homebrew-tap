name: Set up checksum-pinned Aqua toolchain
description: Installs Aqua and every tool pinned in aqua/aqua.yaml with checksum verification

runs:
  using: composite
  steps:
    - name: Install Aqua toolchain
      uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
      with:
        aqua_version: v2.56.0
        working_directory: aqua
        aqua_opts: ''
